# auth-service-prod.yml - PRODUCTION overrides.
# Note the pattern: ONLY references to environment variables. No values.
# The deployment platform (ECS task definition / K8s secret) injects them
# from a secrets store. No secret ever exists in git.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/auth_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

taskflow:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    org.hibernate.SQL: WARN
