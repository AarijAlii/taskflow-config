# collab-service-prod.yml - env-var references only (Chapter 3 rules)

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/collab_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

taskflow:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    org.hibernate.SQL: WARN
